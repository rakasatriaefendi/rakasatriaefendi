name: Update Repositories Section

on:
  schedule:
    - cron: "0 9 * * 1"  # Setiap Senin jam 09.00 UTC (16.00 WIB)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch GitHub Repos Data
        run: |
          curl -s "https://api.github.com/users/rakasatriaefendi/repos?sort=updated&per_page=100" > repos.json

      - name: Filter & Generate Pinned Repos
        run: |
          cat repos.json | jq -r '
          sort_by(.updated_at) | reverse |
          map(select(.fork == false and (.name | ascii_downcase != "rakasatriaefendi")))[:5]
          | .[]
          | "<a href=\"\(.html_url)\"><img src=\"https://gh-card.dev/repos/rakasatriaefendi/\(.name).svg\" alt=\"\(.name)\"></a>"
          ' > pinned.md

      - name: Filter & Generate Skills
        run: |
          cat repos.json | jq -r '
          map(select(.fork == false and .language != null))
          | map(.language)
          | group_by(.)
          | map({lang: .[0], count: length})
          | sort_by(.count) | reverse
          | .[0:8]
          | .[].lang
          ' | while read lang; do
            case "$lang" in
              "Python") icon="python" ;;
              "JavaScript") icon="javascript" ;;
              "TypeScript") icon="typescript" ;;
              "HTML") icon="html" ;;
              "CSS") icon="css" ;;
              "Java") icon="java" ;;
              "C") icon="c" ;;
              "C++") icon="cpp" ;;
              "C#") icon="cs" ;;
              "PHP") icon="php" ;;
              "Ruby") icon="ruby" ;;
              "Go") icon="go" ;;
              "Rust") icon="rust" ;;
              "Swift") icon="swift" ;;
              "Kotlin") icon="kotlin" ;;
              "Dart") icon="dart" ;;
              "Jupyter Notebook") icon="python" ;;
              *) icon="" ;;
            esac
            if [ -n "$icon" ]; then
              echo "  <img alt=\"$lang Logo\" src=\"https://skillicons.dev/icons?i=$icon\" width=\"50\">"
            fi
          done > skills.md

          echo "=== Isi skills.md ==="
          cat skills.md

      - name: Filter & Generate AI/ML Repos
        run: |
          cat repos.json | jq -r '
          sort_by(.updated_at) | reverse |
          map(select(
            (.fork == false) and
            (
              (.name | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception|sentimen|sentiment|cancer|skin|dermify|cinesentia")) or
              (.description != null and (.description | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception|sentimen|sentiment|cancer|skin")))
            )
          ))[:4]
          | .[]
          | "<a href=\"\(.html_url)\"><img src=\"https://gh-card.dev/repos/rakasatriaefendi/\(.name).svg\" alt=\"\(.name)\"></a>"
          ' > aiml.md

      - name: Filter & Generate Web Dev Repos
        run: |
          cat repos.json | jq -r '
          sort_by(.updated_at) | reverse |
          map(select(
            (.fork == false) and
            ((.name | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception") | not) and
             (.description == null or (.description | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception") | not)))
            and
            ((.name | ascii_downcase | test("web|html|css|js|javascript|node|hapi|express|flask|api|supabase|pwa")) or
             (.description != null and (.description | ascii_downcase | test("web|html|css|js|javascript|node|hapi|express|flask|api|supabase|pwa"))) or
             (.language != null and (.language | ascii_downcase | test("html|css|javascript|typescript"))))
          ))[:4]
          | .[]
          | "<a href=\"\(.html_url)\"><img src=\"https://gh-card.dev/repos/rakasatriaefendi/\(.name).svg\" alt=\"\(.name)\"></a>"
          ' > web.md

      - name: Filter & Generate Other Repos
        run: |
          cat repos.json | jq -r '
          sort_by(.updated_at) | reverse |
          map(select(
            (.fork == false) and
            (.name | ascii_downcase == "rakasatriaefendi" | not)
            and
            ((.name | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception") | not) and
             (.description == null or (.description | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception") | not)))
            and
            ((.name | ascii_downcase | test("web|html|css|js|javascript|node|hapi|express|flask|api|supabase|pwa") | not) and
             (.description == null or (.description | ascii_downcase | test("web|html|css|js|javascript|node|hapi|express|flask|api|supabase|pwa") | not)) and
             (.language == null or (.language | ascii_downcase | test("html|css|javascript|typescript") | not)))
          ))[:4]
          | .[]
          | "<a href=\"\(.html_url)\"><img src=\"https://gh-card.dev/repos/rakasatriaefendi/\(.name).svg\" alt=\"\(.name)\"></a>"
          ' > others.md

      - name: Inject Content into README
        run: |
          echo "=== Cek marker di README ==="
          grep -n "START_SECTION\|END_SECTION" README.md

          echo "=== Isi aiml.md ==="
          cat aiml.md

          echo "=== Isi web.md ==="
          cat web.md

          echo "=== Isi others.md ==="
          cat others.md

          # Inject Pinned
          awk '/<!--START_SECTION:pinned-->/ {print; system("cat pinned.md"); skip=1; next} /<!--END_SECTION:pinned-->/ {skip=0} !skip' README.md > temp.md && mv temp.md README.md

          # Inject Skills
          awk '/<!--START_SECTION:skills-->/ {print; system("cat skills.md"); skip=1; next} /<!--END_SECTION:skills-->/ {skip=0} !skip' README.md > temp.md && mv temp.md README.md

          # Inject AI/ML
          awk '/<!--START_SECTION:aiml-->/ {print; system("cat aiml.md"); skip=1; next} /<!--END_SECTION:aiml-->/ {skip=0} !skip' README.md > temp.md && mv temp.md README.md

          # Inject Web Dev
          awk '/<!--START_SECTION:web-->/ {print; system("cat web.md"); skip=1; next} /<!--END_SECTION:web-->/ {skip=0} !skip' README.md > temp.md && mv temp.md README.md

          # Inject Others
          awk '/<!--START_SECTION:others-->/ {print; system("cat others.md"); skip=1; next} /<!--END_SECTION:others-->/ {skip=0} !skip' README.md > temp.md && mv temp.md README.md

          echo "=== Cek README setelah inject ==="
          grep -n "START_SECTION\|END_SECTION\|gh-card\|skillicons" README.md

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: "README.md"
          message: "Auto update multi-category portfolios"
          default_author: github_actions
          github_token: ${{ secrets.GITHUB_TOKEN }}
