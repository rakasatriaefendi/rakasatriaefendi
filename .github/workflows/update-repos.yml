name: Update Repositories Section
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Tambahkan permission ini
permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # upgrade dari v3 ke v4

      - name: Fetch & Filter AI/ML Repos
        run: |
          curl -s "https://api.github.com/users/rakasatriaefendi/repos?sort=updated&per_page=100" > repos.json

          cat repos.json | jq -r '
          sort_by(.updated_at) | reverse |
          map(select(
            (.name | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception")) or
            (.description != null and (.description | ascii_downcase | test("ai|ml|machine|learning|cnn|deep|neural|resnet|xception")))
          ))[:5]
          | .[]
          | "<a href=\"\(.html_url)\"><img height=\"120\" src=\"https://github-readme-stats.vercel.app/api/pin/?username=rakasatriaefendi&repo=\(.name)&theme=tokyonight&border_radius=15\"></a>"
          ' > aiml.md

          echo "=== Isi aiml.md ==="
          cat aiml.md

      - name: Update README
        run: |
          awk '
          /<!--START_SECTION:aiml-->/ {print; system("cat aiml.md"); skip=1; next}
          /<!--END_SECTION:aiml-->/ {skip=0}
          !skip
          ' README.md > README_new.md && mv README_new.md README.md

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: "README.md"
          message: "Auto update AI/ML repos"
          default_author: github_actions
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Tambahkan ini
